<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap');
    </style>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8b5cf6" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#7c3aed" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0a0a0f"/>
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="780" cy="60" r="160" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.12"/>
  <circle cx="780" cy="60" r="100" fill="none" stroke="#a78bfa" stroke-width="0.6" opacity="0.1"/>
  <circle cx="780" cy="60" r="50" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <circle cx="60" cy="220" r="60" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.1"/>

  <!-- Scanline accent -->
  <rect x="0" y="0" width="900" height="2" fill="#7c3aed" opacity="0.6"/>
  <rect x="0" y="278" width="900" height="2" fill="#7c3aed" opacity="0.3"/>

  <!-- Corner brackets -->
  <path d="M 18 18 L 18 36" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 18 18 L 36 18" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 882 18 L 882 36" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 882 18 L 864 18" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 18 262 L 18 244" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 18 262 L 36 262" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 882 262 L 882 244" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  <path d="M 882 262 L 864 262" stroke="#7c3aed" stroke-width="1.5" fill="none"/>

  <!-- System line -->
  <text x="44" y="56" font-family="'Space Mono', monospace" font-size="10" fill="#4c1d95" letter-spacing="2">SYS:<tspan fill="#7c3aed">PROFILE_LOADED</tspan> · VER_2026 · STATUS:<tspan fill="#7c3aed">SEEKING_DEPLOY</tspan></text>

  <!-- Main name -->
  <text x="44" y="128" font-family="'Orbitron', 'Space Mono', monospace" font-size="58" font-weight="900" fill="#f5f3ff" letter-spacing="4" opacity="0.97">VICENTE CASTRO</text>

  <!-- Subtle glow line under name -->
  <rect x="44" y="138" width="520" height="1" fill="#7c3aed" opacity="0.4"/>

  <!-- Role line -->
  <circle cx="50" cy="162" r="3" fill="#7c3aed"/>
  <text x="62" y="167" font-family="'Space Mono', monospace" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="4">FULL STACK DEVELOPER</text>
  <circle cx="300" cy="162" r="3" fill="#7c3aed"/>
  <text x="312" y="167" font-family="'Space Mono', monospace" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="4">PICHILEMU · CL</text>

  <!-- Tagline -->
  <rect x="44" y="188" width="2" height="52" fill="#7c3aed" opacity="0.7"/>


  <!-- Pills -->
  <rect x="44" y="253" width="100" height="18" rx="2" fill="#2d1b4e" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
  <text x="94" y="265" font-family="'Space Mono', monospace" font-size="9" font-weight="700" fill="#a78bfa" text-anchor="middle" letter-spacing="1">OPEN TO WORK</text>

  <rect x="154" y="253" width="90" height="18" rx="2" fill="#0d2a1a" stroke="#15803d" stroke-width="0.8" opacity="0.9"/>
  <text x="199" y="265" font-family="'Space Mono', monospace" font-size="9" font-weight="700" fill="#4ade80" text-anchor="middle" letter-spacing="1">DUOC UC 2026</text>

  <rect x="254" y="253" width="110" height="18" rx="2" fill="#2d1b4e" stroke="#6d28d9" stroke-width="0.8" opacity="0.9"/>
  <text x="309" y="265" font-family="'Space Mono', monospace" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle" letter-spacing="1">4GEEKS ACADEMY</text>
</svg>
